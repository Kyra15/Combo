<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Combo!</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>

<!-- ══════════ LOBBY ══════════ -->
<div id="lobbyScreen" class="screen active">
    <div class="felt-texture"></div>

    <div class="lobby-layout">

        <!-- Left: name + create/join -->
        <div class="lobby-left">
            <div class="logo">
                <!-- <span class="logo-suit">♠</span> -->
                <h1>Combo!</h1>
                <!-- <span class="logo-suit red">♥</span> -->
                <br>
            </div>
            <!-- <p class="tagline">Multiplayer · Up to 8 Players</p> -->

            <div class="field-group">
                <br>
                <label>Your Name</label>
                <input type="text" id="playerName" maxlength="20" autocomplete="off">
            </div>

            <button id="createBtn" class="btn-primary">✦ Create New Game</button>

            <div class="or-divider"><span>or join with ID</span></div>

            <div class="join-row">
                <input type="text" id="gameId" placeholder="Paste a game ID (4 digits)…" maxlength="40" autocomplete="off">
                <button id="joinBtn" class="btn-join">Join</button>
            </div>

            <div id="error" class="error-msg"></div>
        </div>

        <!-- Right: open games list -->
        <div class="lobby-right">
            <div class="games-header">
                <span>Open Games</span>
                <button class="btn-refresh" id="refreshBtn">↺</button>
            </div>
            <div id="gamesList" class="game-list"></div>
        </div>

    </div>
</div>

<!-- ══════════ GAME ══════════ -->
<div id="gameScreen" class="screen hidden">
    <div class="felt-texture"></div>

    <header class="top-bar">
        <div class="game-id-display" id="gameIdDisplay"></div>
        <div class="turn-badge" id="turnBadge">Waiting…</div>
        <button class="btn-leave" id="leaveBtn">Leave Game</button>
    </header>

    <div class="players-ring" id="playersRing"></div>

    <div class="center-zone">
        <div class="pile-label">Center Pile</div>
        <div class="pile-stack" id="pileStack">
            <div class="pile-empty">No cards yet</div>
        </div>
        <div class="pile-count" id="pileCount"></div>
    </div>

    <div class="hand-zone">
        <div class="hand-label" id="handLabel">Your Hand</div>
        <div class="hand-cards" id="handCards"></div>
        <div class="hand-actions">
            <button class="btn-action" id="drawBtn">Draw Card</button>
            <button class="btn-action btn-pass" id="passBtn">Pass Turn</button>
        </div>
    </div>
<!-- 
    <div class="log-panel">
        <div class="log-title">Game Log</div>
        <div class="log-entries" id="logEntries"></div>
    </div> -->
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="script.js"></script>
</body>
</html>
